<!DOCTYPE html>
<html>
<head>
    <title>ForexPro - Home</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: white; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 50px auto; background: #1e293b; padding: 40px; border-radius: 15px; }
        h1 { color: #10b981; margin-bottom: 30px; }
        .nav { margin: 30px 0; }
        .nav a { color: #10b981; text-decoration: none; margin: 0 15px; padding: 10px 20px; background: #064e3b; border-radius: 5px; }
        .nav a:hover { background: #047857; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 Welcome to ForexPro</h1>
        <p>Your professional forex trading platform</p>
        
        <div class="nav">
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'signup' %}">Sign Up</a>
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}">Dashboard</a>
            {% endif %}
        </div>
        
        <h2>🚀 Features</h2>
        <ul style="text-align: left; max-width: 500px; margin: 0 auto;">
            <li>✅ Real-time forex charts</li>
            <li>✅ Professional trading tools</li>
            <li>✅ Educational academy</li>
            <li>✅ Admin user management</li>
            <li>✅ Secure authentication</li>
        </ul>
    </div>
</body>
</html>
