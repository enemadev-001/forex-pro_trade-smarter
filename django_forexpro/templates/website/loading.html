<!DOCTYPE html>
<html>
<head>
    <title>Loading - ForexPro</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: white; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .loader { text-align: center; }
        .logo { font-size: 48px; font-weight: bold; color: #10b981; margin-bottom: 20px; }
        .spinner { border: 4px solid #1e293b; border-top: 4px solid #10b981; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .text { margin-top: 20px; color: #6b7280; }
    </style>
</head>
<body>
    <div class="loader">
        <div class="logo">📈 ForexPro</div>
        <div class="spinner"></div>
        <div class="text">Loading your trading experience...</div>
    </div>
    
    <script>
        setTimeout(function() {
            window.location.href = "{% url 'home' %}";
        }, 3000);
    </script>
</body>
</html>
