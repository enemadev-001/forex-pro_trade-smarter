<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForexPro - Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a4d2e 0%, #2d5f3f 50%, #1a4d2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background particles */
        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            from {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            to {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        .loading-container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .logo-wrapper {
            background: linear-gradient(145deg, #2d5f3f, #1a4d2e);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.3),
                inset 0 2px 5px rgba(255, 255, 255, 0.1),
                inset 0 -2px 5px rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
            animation: logoGlow 2s ease-in-out infinite alternate;
            position: relative;
            overflow: hidden;
        }

        .logo-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.03), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
            }
        }

        @keyframes logoGlow {
            from {
                box-shadow: 
                    0 20px 60px rgba(0, 0, 0, 0.3),
                    inset 0 2px 5px rgba(255, 255, 255, 0.1),
                    inset 0 -2px 5px rgba(0, 0, 0, 0.2),
                    0 0 30px rgba(46, 125, 50, 0.3);
            }
            to {
                box-shadow: 
                    0 20px 60px rgba(0, 0, 0, 0.3),
                    inset 0 2px 5px rgba(255, 255, 255, 0.1),
                    inset 0 -2px 5px rgba(0, 0, 0, 0.2),
                    0 0 50px rgba(76, 175, 80, 0.5);
            }
        }

        .logo-placeholder {
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
            background: radial-gradient(circle, #2d5f3f, #1a4d2e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: pulse 2s ease-in-out infinite;
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 0 50px rgba(76, 175, 80, 0.3),
                inset 0 0 30px rgba(0, 0, 0, 0.2);
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .logo-content {
            text-align: center;
            color: white;
        }

        .logo-title {
            font-size: 48px;
            font-weight: bold;
            color: #4caf50;
            text-shadow: 
                0 0 20px rgba(76, 175, 80, 0.5),
                0 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .logo-subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
            font-weight: 300;
        }

        .compass-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #4caf50, #2d5f3f);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: rotate 4s linear infinite;
            box-shadow: 
                0 0 30px rgba(76, 175, 80, 0.4),
                inset 0 0 20px rgba(0, 0, 0, 0.2);
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .compass-icon::before {
            content: '🧭';
            font-size: 60px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .loading-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 20px;
            margin-top: 20px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .loading-dots {
            display: inline-block;
            width: 20px;
            text-align: left;
        }

        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% {
                content: '';
            }
            40% {
                content: '.';
            }
            60% {
                content: '..';
            }
            80%, 100% {
                content: '...';
            }
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            border-radius: 2px;
            animation: progress 9s linear forwards;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        @keyframes progress {
            from {
                width: 0%;
            }
            to {
                width: 100%;
            }
        }

        .currency-symbols {
            position: absolute;
            font-size: 24px;
            color: rgba(255, 255, 255, 0.6);
            animation: floatSymbol 6s ease-in-out infinite;
        }

        .currency-symbols:nth-child(1) {
            top: 20px;
            left: 20px;
            animation-delay: 0s;
        }

        .currency-symbols:nth-child(2) {
            top: 20px;
            right: 20px;
            animation-delay: 2s;
        }

        .currency-symbols:nth-child(3) {
            bottom: 20px;
            left: 20px;
            animation-delay: 4s;
        }

        .currency-symbols:nth-child(4) {
            bottom: 20px;
            right: 20px;
            animation-delay: 1s;
        }

        @keyframes floatSymbol {
            0%, 100% {
                transform: translateY(0px);
                opacity: 0.6;
            }
            50% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background -->
    <div class="bg-animation" id="bgAnimation"></div>

    <div class="loading-container">
        <div class="logo-wrapper">
            <!-- Currency symbols decoration -->
            <div class="currency-symbols">£</div>
            <div class="currency-symbols">$</div>
            <div class="currency-symbols">€</div>
            <div class="currency-symbols">¥</div>

            <div class="logo-placeholder">
                <div class="logo-content">
                    <div class="compass-icon"></div>
                    <div class="logo-title">ForexPro</div>
                    <div class="logo-subtitle">Professional Trading Platform</div>
                </div>
            </div>

            <div class="loading-text">
                Loading<span class="loading-dots"></span>
            </div>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const bgAnimation = document.getElementById('bgAnimation');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                bgAnimation.appendChild(particle);
            }
        }

        // Redirect after 9 seconds
        function redirectAfterDelay() {
            setTimeout(() => {
                window.location.href = '/home';
            }, 9000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            redirectAfterDelay();
        });
    </script>
</body>
</html>
